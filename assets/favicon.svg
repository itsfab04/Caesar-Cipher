<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="redGlow" cx="18%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#8B1416" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#8B1416" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinGrad" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="60%" stop-color="#c89820"/>
      <stop offset="100%" stop-color="#6b4f00"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#0b0c11"/>
  <!-- Roman red ambient from left -->
  <rect width="32" height="32" rx="5" fill="url(#redGlow)"/>

  <!-- Outer ring body -->
  <circle cx="16" cy="16" r="14.5" fill="#2a2115" stroke="#c89820" stroke-width="1.2"/>
  <!-- Outer ring inner border -->
  <circle cx="16" cy="16" r="12.2" fill="none" stroke="#c89820" stroke-width="0.4" opacity="0.35"/>

  <!-- 8 major tick marks on outer ring -->
  <g stroke="#ffb600" stroke-width="0.9" opacity="0.65">
    <line x1="16" y1="1.5" x2="16" y2="4.8"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(45,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(90,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(135,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(180,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(225,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(270,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="4.8" transform="rotate(315,16,16)"/>
  </g>
  <!-- 8 minor tick marks (between majors) -->
  <g stroke="#ffb600" stroke-width="0.5" opacity="0.3">
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(22.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(67.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(112.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(157.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(202.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(247.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(292.5,16,16)"/>
    <line x1="16" y1="1.5" x2="16" y2="3.5" transform="rotate(337.5,16,16)"/>
  </g>

  <!-- Inner wheel -->
  <circle cx="16" cy="16" r="9" fill="#1a1608" stroke="#9a7818" stroke-width="1"/>
  <!-- Inner ring border -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#9a7818" stroke-width="0.4" opacity="0.45"/>

  <!-- 6 inner tick marks -->
  <g stroke="#c89820" stroke-width="0.6" opacity="0.5">
    <line x1="16" y1="7.2" x2="16" y2="9"/>
    <line x1="16" y1="7.2" x2="16" y2="9" transform="rotate(60,16,16)"/>
    <line x1="16" y1="7.2" x2="16" y2="9" transform="rotate(120,16,16)"/>
    <line x1="16" y1="7.2" x2="16" y2="9" transform="rotate(180,16,16)"/>
    <line x1="16" y1="7.2" x2="16" y2="9" transform="rotate(240,16,16)"/>
    <line x1="16" y1="7.2" x2="16" y2="9" transform="rotate(300,16,16)"/>
  </g>

  <!-- Center pin with metallic gradient -->
  <circle cx="16" cy="16" r="2.4" fill="url(#pinGrad)" stroke="#ffb600" stroke-width="0.5"/>
  <!-- Pin shine highlight -->
  <circle cx="15.1" cy="15.1" r="0.75" fill="rgba(255,255,255,0.55)"/>
</svg>
